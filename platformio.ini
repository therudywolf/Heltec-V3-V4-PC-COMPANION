; V4 hardware: use V3 board profile (same MCU/flash). Env name for clarity.
[env:heltec_wifi_lora_32_V4]
platform = espressif32 @ 6.5.0  ; <--- CRITICAL: PINNED VERSION
board = heltec_wifi_lora_32_V3
framework = arduino

; Hardware & Partitioning
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_build.partitions = huge_app.csv
build_src_filter = +<*> -<boot_selector/>

; Monitor
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time, colorize

; Compiler & Build Logic
lib_ldf_mode = deep+
lib_archive = no
build_flags = 
    -D ARDUINO_USB_CDC_ON_BOOT=1 
    -D ARDUINO_USB_MODE=1
    -I include
    -I src
    -I src/modules
    -I src/modules/display
    -I src/modules/network
    -I src/modules/ble
    -I src/modules/usb
    -I src/modules/car
    -I src/modules/car/ibus
    -I src/modules/system

; Dependencies
lib_deps = 
    USB
    olikraus/U8g2 @ ^2.35.9
    bblanchon/ArduinoJson @ ^7.0.3
    h2zero/NimBLE-Arduino @ ^1.4.2 ; Bumped to latest 1.x stable
    https://github.com/marian-craciunescu/ESP32Ping.git

; ---------------------------------------------------------------------------
; Boot selector: minimal app for factory partition (dual boot with Meshtastic).
; Uses dual_boot.csv. Build: pio run -e boot_selector. Upload to factory (0x10000)
; only if device is partitioned with dual_boot.csv. When otadata is empty,
; this runs: button held -> boot ota_1 (Meshtastic), else -> ota_0 (Nocturne).
; ---------------------------------------------------------------------------
[env:boot_selector]
platform = espressif32 @ 6.5.0
board = heltec_wifi_lora_32_V3
framework = arduino
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_build.partitions = dual_boot.csv
build_src_filter = -<*> +<boot_selector/main.cpp>
build_flags = -D BOOT_SELECTOR_BUTTON_PIN=0
