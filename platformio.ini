; Nocturne firmware for Heltec WiFi LoRa 32 V4 (ESP32-S3).
[platformio]
default_envs = heltec_wifi_lora_32_V4

; Heltec V4: ESP32-S3, Serial1 for I-Bus on pins RX=38, TX=39 (NOCT_IBUS_RX_PIN / NOCT_IBUS_TX_PIN in config.h).
; V4 hardware: use V3 board profile (same MCU/flash). Env name for clarity.
[env:heltec_wifi_lora_32_V4]
platform = espressif32 @ 6.5.0  ; <--- CRITICAL: PINNED VERSION
board = heltec_wifi_lora_32_V3
framework = arduino

; Hardware & Partitioning (ESP32-S3)
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_build.partitions = ${PROJECT_DIR}/huge_app.csv
board_build.filesystem = littlefs
build_src_filter = +<*>

; Monitor
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time

; Compiler & Build Logic
lib_ldf_mode = deep+
lib_archive = no
build_flags = 
    -D ARDUINO_USB_CDC_ON_BOOT=1 
    -D ARDUINO_USB_MODE=1
    -I include
    -I src
    -I src/modules
    -I src/modules/display
    -I src/modules/network
    -I src/modules/ble
    -I src/modules/car
    -I src/modules/car/ibus
    -I src/modules/system

; Dependencies: U8g2 — OLED; NimBLE — BLE (BMW key). ArduinoJson removed (BMW-only, no TCP/JSON).
lib_deps = 
    olikraus/U8g2 @ ^2.35.9
    h2zero/NimBLE-Arduino @ ^1.4.2

