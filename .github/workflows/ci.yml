name: CI

on:
  push:
    branches: [main, WolfPet]
  pull_request:
    branches: [main, WolfPet]

jobs:
  firmware:
    name: Build firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PlatformIO
        run: pip install platformio
      - name: Build
        run: cd firmware && pio run
